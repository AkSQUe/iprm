name: Verify requirements.lock

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - requirements.lock
      - scripts/verify-lock.py
  pull_request:
    paths:
      - requirements.txt
      - requirements.lock
      - scripts/verify-lock.py

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Verify lock is in sync with requirements.txt
        run: python scripts/verify-lock.py
