name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify requirements.lock is in sync
        # Hard gate: fail before rsync so we never ship a lock that will break
        # `pip install -r requirements.lock` on the VPS.
        run: python3 scripts/verify-lock.py

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='keys/' --exclude='.env' --exclude='venv/' --exclude='iprm.sock' --exclude='app/static/images/courses/'
          path: ./
          remote_path: /var/www/iprm/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Restart application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/iprm
            source venv/bin/activate
            pip install -r requirements.lock --quiet
            flask db upgrade
            chown -R www-data:www-data /var/www/iprm
            systemctl restart iprm
            sleep 3
            curl -sf --unix-socket /var/www/iprm/iprm.sock http://localhost/ > /dev/null || (systemctl status iprm --no-pager; exit 1)
