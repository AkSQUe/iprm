<footer class="iprm-footer">
  <div class="iprm-footer__inner">
    <div class="iprm-footer__row">
      <div class="iprm-footer__left">
        <a href="{{ url_for('main.index') }}" class="iprm-footer__brand">
          <img src="{{ url_for('static', filename='svg/IPRM-logo-complex.svg') }}" alt="ІПРМ" class="iprm-footer__logo" height="72">
        </a>
      </div>
      <div class="iprm-footer__right">
        <div class="iprm-footer__socials">
          {% if site_settings.facebook_url %}
          <a href="{{ site_settings.facebook_url }}" class="iprm-footer__social-icon" aria-label="{{ site_settings.company_name }} у Facebook" target="_blank" rel="noopener noreferrer">
            <img src="{{ url_for('static', filename='svg/social/facebook.svg') }}" alt="Facebook" width="24" height="24">
          </a>
          {% endif %}
          {% if site_settings.instagram_url %}
          <a href="{{ site_settings.instagram_url }}" class="iprm-footer__social-icon" aria-label="{{ site_settings.company_name }} в Instagram" target="_blank" rel="noopener noreferrer">
            <img src="{{ url_for('static', filename='svg/social/instagram.svg') }}" alt="Instagram" width="24" height="24">
          </a>
          {% endif %}
        </div>
        <a href="tel:{{ site_settings.phone_primary }}" class="iprm-footer__phone">{{ site_settings.phone_primary }}</a>
      </div>
    </div>
    <div class="iprm-footer__legal">
      <a href="{{ url_for('main.offer') }}" class="iprm-footer__link">Оферта</a>
      <a href="{{ url_for('main.privacy') }}" class="iprm-footer__link">Конфіденційність</a>
      <a href="{{ url_for('main.refund') }}" class="iprm-footer__link">Повернення</a>
      <a href="{{ url_for('main.disclaimer') }}" class="iprm-footer__link">Дисклеймер</a>
      <a href="{{ url_for('main.cookies') }}" class="iprm-footer__link">Cookie</a>
      <a href="{{ url_for('main.contact') }}" class="iprm-footer__link">Контакти</a>
    </div>
    <span class="iprm-footer__copy">&copy; 2026 ІПРМ</span>
  </div>
</footer>
