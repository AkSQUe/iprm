{% extends "emails/base.html" %}
{% block title %}Тестовий лист{% endblock %}
{% block content %}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td align="center" style="padding:0 0 32px;">
      <div style="width:64px; height:64px; border-radius:16px; background:linear-gradient(135deg, #7055a4, #9b59b6, #e8913a); display:inline-block; line-height:64px; text-align:center;">
        <span style="font-size:28px; color:#ffffff;">&#9993;</span>
      </div>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:0 0 12px;">
      <h1 style="margin:0; font-size:28px; font-weight:800; letter-spacing:-0.03em; color:#1d1d1f; line-height:1.15;">
        Тестовий лист
      </h1>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:0 0 32px;">
      <p style="margin:0; color:#86868b; font-size:17px; line-height:1.5; max-width:420px;">
        Цей лист надіслано з адмін-панелі IPRM для перевірки налаштувань email.
      </p>
    </td>
  </tr>
  <tr>
    <td style="padding:0 0 32px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f7; border-radius:16px;">
        <tr>
          <td style="padding:20px 24px;">
            <p style="margin:0; font-size:13px; color:#86868b; text-transform:uppercase; letter-spacing:0.06em; font-weight:600;">Отримувач</p>
            <p style="margin:6px 0 0; font-size:17px; font-weight:600; color:#1d1d1f;">{{ to_email }}</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" style="background:#f0ecf8; border-radius:12px;">
        <tr>
          <td style="padding:12px 24px;">
            <p style="margin:0; font-size:14px; color:#7055a4; font-weight:500;">
              Email-система працює коректно
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% endblock %}
