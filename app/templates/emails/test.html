{% extends "emails/base.html" %}
{% block title %}Тестовий лист{% endblock %}
{% block content %}
<h1 style="font-size:24px; font-weight:800; letter-spacing:-0.03em; color:#1d1d1f; margin:0 0 16px;">
  Тестовий лист
</h1>
<p style="color:#424245; font-size:16px; line-height:1.6; margin:0 0 16px;">
  Цей лист надіслано з адмін-панелі IPRM для перевірки налаштувань email.
</p>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f7; border-radius:12px; margin-bottom:16px;">
  <tr>
    <td style="padding:16px 24px; font-size:14px; color:#86868b;">
      Отримувач: <strong style="color:#1d1d1f;">{{ to_email }}</strong>
    </td>
  </tr>
</table>
<p style="color:#86868b; font-size:14px; margin:0;">
  Якщо ви отримали цей лист, email-система працює коректно.
</p>
{% endblock %}
