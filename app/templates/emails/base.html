<!DOCTYPE html>
<html lang="uk" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>{% block title %}IPRM{% endblock %}</title>
  <!--[if mso]>
  <style>body,table,td,h1,h2,p,span,a{font-family:Arial,sans-serif!important;}</style>
  <![endif]-->
  <style>
    @media only screen and (max-width: 620px) {
      .email-card { padding: 32px 24px 28px !important; }
      .email-wrapper { padding: 24px 8px !important; }
      h1 { font-size: 24px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f5f5f7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;">
  {% block preheader %}{% endblock %}
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7;">
    <tr>
      <td align="center" class="email-wrapper" style="padding:48px 16px;">

        <!-- Logo -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%;">
          <tr>
            <td align="center" style="padding:0 0 32px;">
              <span style="font-size:22px; font-weight:700; color:#7055a4; letter-spacing:-0.02em;">IPRM</span>
            </td>
          </tr>
        </table>

        <!-- Content card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" bgcolor="#ffffff" style="background-color:#ffffff; border-radius:24px; overflow:hidden; max-width:600px; width:100%;">
          <tr>
            <td class="email-card" style="padding:48px 48px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
        </table>

        <!-- Footer -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%;">
          <tr>
            <td style="padding:32px 24px; text-align:center;">
              {% block footer %}
              <p style="margin:0; font-size:13px; color:#86868b; line-height:1.6;">
                IPRM &mdash; Інститут Плазмотерапії та Регенеративної Медицини
              </p>
              <p style="margin:8px 0 0; font-size:13px;">
                <a href="https://iprm.space" style="color:#7055a4; text-decoration:none; font-weight:500;">iprm.space</a>
              </p>
              <p style="margin:16px 0 0; font-size:11px; color:#b0b0b5; line-height:1.5;">
                Ви отримали цей лист, бо зареєстровані на платформі IPRM.
              </p>
              {% endblock %}
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
