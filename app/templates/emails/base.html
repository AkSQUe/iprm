<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}IPRM{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f5f7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:16px; overflow:hidden; max-width:600px; width:100%;">
          <!-- Header -->
          <tr>
            <td style="padding:32px 40px 16px; text-align:center; border-bottom:1px solid #f0f0f0;">
              <h2 style="margin:0; color:#7055a4; font-size:20px; font-weight:700; letter-spacing:-0.02em;">IPRM</h2>
              <p style="margin:4px 0 0; font-size:11px; color:#86868b; text-transform:uppercase; letter-spacing:0.08em;">Інститут Плазмотерапії</p>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:32px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px; background-color:#f5f5f7; text-align:center; font-size:12px; color:#86868b; line-height:1.5;">
              {% block footer %}
              <p style="margin:0;">IPRM &mdash; Інститут Плазмотерапії та Регенеративної Медицини</p>
              <p style="margin:4px 0 0;"><a href="https://iprm.space" style="color:#7055a4; text-decoration:none;">iprm.space</a></p>
              {% endblock %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
