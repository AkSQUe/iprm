{% extends 'base.html' %}

{% block title %}Доступ заборонено | IPRM{% endblock %}
{% block extra_meta %}<meta name="robots" content="noindex, nofollow">{% endblock %}

{% block content %}
  <div class="iprm-error-page">
    <div class="iprm-error-page__code">403</div>
    <h1 class="iprm-error-page__title">Доступ заборонено</h1>
    <p class="iprm-error-page__subtitle">У вас немає прав для перегляду цієї сторінки</p>
    <nav class="iprm-error-page__actions">
      <a href="{{ url_for('main.index') }}" class="apple-btn apple-btn--primary">На головну</a>
    </nav>
  </div>
{% endblock %}
