{% extends 'base.html' %}

{% block title %}Сторінку не знайдено | IPRM{% endblock %}
{% block extra_meta %}<meta name="robots" content="noindex, nofollow">{% endblock %}

{% block content %}
  <div class="iprm-error-page">
    <div class="iprm-error-page__image">
      <img src="{{ url_for('static', filename='images/error-pages/404.webp') }}" alt="404" width="280" height="280">
    </div>
    <h1 class="iprm-error-page__title">Сторінка перебуває на стадії <span class="apple-gradient-text">репаративної регенерації</span></h1>
    <p class="iprm-error-page__subtitle">Буде здоровою й красивою найближчим часом</p>
    <nav class="iprm-error-page__actions">
      <a href="{{ url_for('main.index') }}" class="apple-btn apple-btn--primary">На головну</a>
      <a href="{{ url_for('courses.course_list') }}" class="apple-btn apple-btn--secondary">Курси</a>
    </nav>
  </div>
{% endblock %}
