<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='svg/IPRM-logo-simple.svg') }}">
  <title>{% block title %}IPRM{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/molecular-background.css') }}">
  {% block extra_css %}{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <div id="molecular-background" aria-hidden="true"></div>

  {% block header %}
  {% include 'partials/header.html' %}
  {% endblock %}

  {% block content %}{% endblock %}

  {% block footer %}
  {% include 'partials/footer.html' %}
  {% endblock %}

  <script src="{{ url_for('static', filename='js/molecular-background.js') }}"></script>
</body>
</html>
